{% set name = "gemseo" %}
{% set version = "6.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 4670a65823dd3a18d2a0e440a7eee853333855bc6af82add44f5a56eb895f50a

build:
  skip: true  # [py>=313 or py2k]
  entry_points:
    - gemseo-study = gemseo.utils.study_analyses.study_analysis_cli:main
    - gemseo-deserialize-run = gemseo.utils.deserialize_and_run:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools
    - pip
  run:
    - python
    - docstring-inheritance >=2.0.0,<=2.2.2
    - python-fastjsonschema >=2.14.5,<=2.21.2
    - genson >=1.2.2,<=1.3.0
    - h5py >=3.6.0,<=3.14.0
    - jinja2 >=3.0.0,<=3.1.6
    - matplotlib-base >=3.6.0,<=3.10.6
    - networkx >=2.5,<=3.5
    - numpy >=1.23,<=2.3.3
    - packaging >=15,<=25
    - pandas >=2.1.0,<=2.3.2
    - prettytable >=2.3.0,<=3.16.0
    - pyxdsm >=2.2.1,<=2.3.1
    - pydantic >=2.7,<=2.11.9
    - pydantic-settings >=2.1.0,<=2.11.0
    - requests >2,<3
    - scipy >=1.12,<=1.15.2
    - strenum >=0.4.9,<=0.4.15
    - tqdm >=4.50,<=4.67.1
    - typing_extensions >=4,<5
    - xdsmjs >=1.0.0,<=2.0.0
    - python-xxhash >=3.0.0,<=3.5.0
    - minisom >=2.3.5,<2.4
# Extra: all
    - python-graphviz >=0.19,<=0.21
    - nlopt >=2.7.0,<=2.9.1
    - openpyxl >=3.0.10,<=3.1.5
    - openturns >=1.20,<=1.25
    - pillow >=9.5.0,<=11.3.0
    - plotly >=5.7.0,<=6.3.0
    - pyDOE3 >=1.0.1,<=1.4.0
    - scikit-learn >=1.2,<=1.7.2
    - spgl1 ==0.0.3
    - sympy >=1.5,<=1.14.0
    - xlwings >=0.27.0,<=0.33.16  # [win]

test:
  imports:
    - gemseo
  commands:
    - gemseo-study --help
    - gemseo-deserialize-run --help
  requires:
    - pip

about:
  home: https://gemseo.org
  summary: Generic Engine for Multi-disciplinary Scenarios, Exploration and Optimization
  dev_url: https://gitlab.com/gemseo/dev/gemseo
  license: LGPL-3.0-or-later
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - AntoineD
